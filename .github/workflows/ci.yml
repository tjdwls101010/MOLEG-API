name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile package
        run: python -m compileall moleg_api scripts tests

      - name: Check patch hygiene
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff --check HEAD^ HEAD
          fi

      - name: Run deterministic tests
        run: python -m pytest -q -m "not live"

  package:
    name: Package install gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps -w dist

      - name: Verify repo-external import
        run: |
          target="$(mktemp -d)"
          python -m pip install dist/*.whl --no-deps --target "$target"
          cd /tmp
          INSTALL_TARGET="$target" PYTHONPATH="$target" python - <<'PY'
          import importlib.resources
          import os
          from pathlib import Path

          import moleg_api
          from moleg_api import Basis, DeferredLookup, LawIdentity, MolegApi

          package_file = Path(moleg_api.__file__).resolve()
          install_target = Path(os.environ["INSTALL_TARGET"]).resolve()
          assert package_file.is_relative_to(install_target), package_file
          assert importlib.resources.files("moleg_api").joinpath("py.typed").is_file()
          assert all(hasattr(moleg_api, name) for name in moleg_api.__all__)

          identity = LawIdentity(law_id="001234", name="테스트법", basis="effective")
          data = identity.to_dict()

          assert data["law_id"] == "001234"
          assert data["name"] == "테스트법"
          assert "raw" not in data
          lookup = DeferredLookup(
              interface="get_law",
              query="테스트법",
              reason="Load selected context",
              filters={
                  "articles": {"제3조", "제1조", "제2조"},
                  "collision": {"1": "string-one", 1: "int-one", "int:1": "literal-tag"},
              },
          )
          lookup_data = lookup.to_dict()
          assert lookup_data["filters"]["articles"] == ["제1조", "제2조", "제3조"]
          assert lookup_data["filters"]["collision"] == {
              "int:1": "int-one",
              "str:'1'": "string-one",
              "str:'int:1'": "literal-tag",
          }
          assert Basis
          assert MolegApi
          PY
